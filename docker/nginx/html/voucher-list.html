<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券列表 - IntellRecipe</title>
    <!-- 使用本地 JS，彻底解决加载慢的问题 -->
    <script src="js/vue.min.js"></script>
    <script src="js/axios.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; color: #333; }
        .voucher-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .voucher-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }
        .voucher-card:hover { transform: translateY(-5px); }
        .card-content { padding: 20px; }
        .title { font-size: 18px; font-weight: bold; color: #333; }
        .sub-title { font-size: 14px; color: #666; margin: 5px 0 15px; }
        .price-row { display: flex; align-items: baseline; gap: 10px; }
        .price { color: #f56c6c; font-size: 24px; font-weight: bold; }
        .origin-price { color: #999; text-decoration: line-through; font-size: 14px; }
        .tag {
            position: absolute; top: 10px; right: 10px;
            background: #e6a23c; color: white; padding: 2px 8px; font-size: 12px; border-radius: 4px;
        }
        .tag.seckill { background: #f56c6c; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h2 class="header">热门优惠券</h2>
    
    <div class="voucher-list">
        <div class="voucher-card" v-for="v in vouchers" :key="v.id" @click="toDetail(v.id)">
            <div class="tag" :class="{ seckill: v.type === 1 }">
                {{ v.type === 1 ? '限时秒杀' : '普通券' }}
            </div>
            <div class="card-content">
                <div class="title">{{ v.title }}</div>
                <div class="sub-title">{{ v.subTitle }}</div>
                <div class="price-row">
                    <span class="price">¥ {{ v.payValue / 100 }}</span>
                    <span class="origin-price">¥ {{ v.actualValue / 100 }}</span>
                </div>
            </div>
        </div>
    </div>
    
    <div v-if="vouchers.length === 0" style="text-align: center; color: #999; margin-top: 50px;">
        暂无优惠券
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            vouchers: []
        },
        created() {
            this.loadAllVouchers([501, 502, 503]);
        },
        methods: {
            loadAllVouchers(shopIds) {
                const requests = shopIds.map(id =>
                    axios.get(`/api/vouchers/list/${id}`).catch(() => ({ data: { success: false } }))
                );
                Promise.all(requests).then(responses => {
                    const all = [];
                    responses.forEach(res => {
                        if (res.data.success && Array.isArray(res.data.data)) {
                            all.push(...res.data.data);
                        }
                    });
                    this.vouchers = all;
                });
            },
            toDetail(id) {
                window.location.href = `voucher-detail.html?id=${id}`;
            }
        }
    });
</script>
</body>
</html>
