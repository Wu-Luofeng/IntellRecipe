version: "3.3"

services:
  # MySQL 5.7
  mysql:
    image: mysql:5.7
    container_name: intellrecipe-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306" # 映射宿主机3307端口到容器3306，符合application.yml配置
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis 6.2
  redis:
    image: redis:6.2
    container_name: intellrecipe-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/conf/redis.conf:/etc/redis/redis.conf
    # 启动命令：使用配置文件并设置密码
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD} --appendonly yes

  # Elasticsearch 7.17.24
  elasticsearch:
    image: elasticsearch:7.17.24
    container_name: intellrecipe-es
    restart: always
    environment:
      - "discovery.type=single-node"
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS}"
      - "TZ=Asia/Shanghai"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./es/data:/usr/share/elasticsearch/data
      # - ./es/plugins:/usr/share/elasticsearch/plugins

  # Kibana 7.17.24 (Temporarily disabled to save memory)
  # kibana:
  #   image: kibana:7.17.24
  #   container_name: intellrecipe-kibana
  #   restart: always
  #   environment:
  #     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
  #     - TZ=Asia/Shanghai
  #   ports:
  #     - "5601:5601"
  #   depends_on:
  #     - elasticsearch

  # Nacos 2.2.0
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: intellrecipe-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: always

  # RabbitMQ 3.13-management
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: intellrecipe-rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - TZ=Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq

  # Nginx：使用宿主机网络，直连 127.0.0.1:10010 的 Gateway，避免 Docker 访问 host.docker.internal 超时 504
  nginx:
    image: nginx:1.18.0
    container_name: intellrecipe-nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - mysql
      - redis
