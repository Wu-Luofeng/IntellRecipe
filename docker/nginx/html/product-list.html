<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>商品列表 - IntellRecipe</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    /* 商家头图 */
    .shop-hero {
      height: 180px; background: linear-gradient(135deg, var(--primary-light), var(--bg));
      position: relative; overflow: hidden;
    }
    .shop-hero-img { width: 100%; height: 100%; object-fit: cover; }
    .shop-hero-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.55));
      padding: 20px 16px 12px; color: #fff;
    }
    .shop-hero-name { font-size: 20px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .shop-hero-meta { font-size: 12px; opacity: .9; margin-top: 4px; display: flex; gap: 12px; }

    /* 分类 + 筛选 */
    .cat-bar {
      display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      scrollbar-width: none; position: sticky; top: var(--header-h); z-index: 40;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0; padding: 5px 16px; border-radius: 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: var(--bg); color: var(--text-sub);
      transition: background var(--transition), color var(--transition);
    }
    .cat-chip.active { background: var(--primary); color: #fff; }

    /* 商品网格 */
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px 16px; }
    .product-card {
      background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); cursor: pointer; transition: transform var(--transition);
    }
    .product-card:active { transform: scale(.97); }
    .product-img {
      width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--bg);
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-body { padding: 10px; }
    .product-name { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px; }
    .product-price-row { display: flex; align-items: center; justify-content: space-between; }
    .product-price { color: var(--accent); font-size: 16px; font-weight: 800; }
    .product-price span { font-size: 12px; }
    .add-btn {
      width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
      border: none; color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: transform var(--transition);
    }
    .add-btn:active { transform: scale(.88); }
    .product-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }

    /* 空状态、loading */
    .load-tip { text-align: center; padding: 24px; color: var(--text-hint); grid-column: span 2; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <span class="page-title">商品列表</span>
      <span class="header-action" @click="location.href='voucher-list.html'">领券</span>
    </div>

    <div style="padding-top: var(--header-h)">
      <!-- 商家头图（暂无 GET /merchant/{id} 接口，使用占位） -->
      <div class="shop-hero">
        <div class="shop-img-placeholder" style="width:100%;height:100%;background:linear-gradient(135deg,var(--primary-light),#fff);display:flex;align-items:center;justify-content:center;font-size:64px">🏪</div>
        <div class="shop-hero-info">
          <div class="shop-hero-name">精选商家</div>
          <div class="shop-hero-meta">
            <span>★ 4.8</span>
            <span>新鲜直达</span>
            <span>品质保障</span>
          </div>
        </div>
      </div>

      <!-- 分类 -->
      <div class="cat-bar">
        <div v-for="cat in categories" :key="cat.id"
             :class="['cat-chip', activeCat===cat.id?'active':'']"
             @click="activeCat=cat.id">{{ cat.name }}</div>
      </div>

      <!-- 商品网格 -->
      <div class="product-grid">
        <div v-for="p in list" :key="p.id" class="product-card"
             @click="goDetail(p.id)">
          <div class="product-img">
            <img v-if="p.image" :src="p.image" :alt="p.name" @error="$event.target.style.display='none'">
            <span v-else>🥗</span>
          </div>
          <div class="product-body">
            <div class="product-tags">
              <span v-if="p.stock != null && p.stock < 5" class="tag tag-accent" style="font-size:11px">仅剩{{p.stock}}</span>
            </div>
            <div class="product-name">{{ p.name }}</div>
            <div class="product-price-row">
              <div class="product-price"><span>¥</span>{{ p.price }}</div>
              <button class="add-btn" @click.stop="addCart(p)">+</button>
            </div>
          </div>
        </div>

        <div v-if="loading" class="load-tip">加载中…</div>
        <div v-else-if="list.length===0 && !loading" class="load-tip">暂无商品</div>
        <div v-else-if="noMore && list.length>0" class="load-tip">— 已显示全部 —</div>
      </div>
    </div>
  </div>

  <script src="js/vue.min.js"></script>
  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        merchantId: null, list: [], lastId: null, limit: 20,
        loading: false, noMore: false, activeCat: 0,
        categories: [{ id: 0, name: '全部' }, { id: 1, name: '轻食' }, { id: 2, name: '沙拉' }, { id: 3, name: '套餐' }, { id: 4, name: '饮品' }],
      },
      created() {
        // 兼容旧的 shopId 参数
        this.merchantId = Utils.getParam('merchantId') || Utils.getParam('shopId') || 1;
        this.loadMore();
        window.addEventListener('scroll', this.onScroll);
      },
      beforeDestroy() { window.removeEventListener('scroll', this.onScroll); },
      methods: {
        async loadMore() {
          if (this.loading || this.noMore) return;
          this.loading = true;
          try {
            const params = { merchantId: this.merchantId, limit: this.limit };
            if (this.lastId) params.lastId = this.lastId;
            const res = await axios.get('/api/product/list', { params });
            const data = res.data?.data || {};
            const rows = data.list || [];
            this.list.push(...rows);
            if (rows.length < this.limit || data.minTime == null) {
              this.noMore = true;
            } else {
              this.lastId = data.minTime;
            }
          } catch (e) {
            console.error(e);
            Utils.toast('加载失败');
          } finally { this.loading = false; }
        },
        onScroll() {
          const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
          if (scrollHeight - scrollTop - clientHeight < 120) this.loadMore();
        },
        goDetail(id) { location.href = `product-detail.html?id=${id}&merchantId=${this.merchantId}`; },
        addCart(p) { Utils.toast('购物车功能开发中'); },
      }
    });
  </script>
</body>
</html>
