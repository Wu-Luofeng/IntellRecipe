<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntellRecipe - 智能食谱</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        header { background-color: #009688; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .nav-item { background: white; padding: 20px; border-radius: 10px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .nav-item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .icon { font-size: 2rem; }
        .login-btn { background: white; color: #009688; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🍳 IntellRecipe</div>
        <div class="user-info" id="userInfo">
            <a href="login.html" class="login-btn">登录 / 注册</a>
        </div>
    </header>

    <div class="nav-grid">
        <a href="shop-list.html" class="nav-item">
            <span class="icon">🏪</span>
            <span>探店美食</span>
        </a>
        <a href="#" class="nav-item">
            <span class="icon">📝</span>
            <span>发布笔记</span>
        </a>
        <a href="ingredient-list.html" class="nav-item">
            <span class="icon">🥗</span>
            <span>食材大全</span>
        </a>
        <a href="/voucher-list.html" class="nav-item">
            <span class="icon">🎟️</span>
            <span>领券中心</span>
        </a>
        <a href="#" class="nav-item">
            <span class="icon">👤</span>
            <span>个人中心</span>
        </a>
    </div>

    <script>
        // 检查登录状态
        const token = localStorage.getItem('token');
        if (token) {
            document.getElementById('userInfo').innerHTML = `
                <span>已登录</span>
                <a href="#" onclick="logout()" style="color: white; text-decoration: none; margin-left: 10px;">退出</a>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }
    </script>
</body>
</html>
