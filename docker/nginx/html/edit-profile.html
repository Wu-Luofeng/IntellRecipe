<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>编辑资料 - IntellRecipe</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .avatar-section {
      background: var(--bg-card); padding: 28px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .avatar-ring {
      position: relative; width: 96px; height: 96px; cursor: pointer;
    }
    .avatar-ring img {
      width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--primary-light); background: var(--bg);
    }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,.35); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      opacity: 0; transition: opacity var(--transition);
    }
    .avatar-ring:hover .avatar-overlay,
    .avatar-ring:active .avatar-overlay { opacity: 1; }
    .avatar-overlay svg { width: 22px; height: 22px; color: #fff; }
    .avatar-overlay span { font-size: 11px; color: #fff; }
    .avatar-tip { font-size: 13px; color: var(--text-sub); }
    #fileInput { display: none; }

    /* 上传进度条 */
    .upload-bar { width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: none; }
    .upload-fill { height: 100%; background: var(--primary); width: 0; transition: width .3s; }

    /* 表单区 */
    .form-section { margin: 16px; }
    .form-card { background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; }
    .form-row {
      display: flex; align-items: center; padding: 0 16px; height: 54px;
      border-bottom: 1px solid var(--border);
    }
    .form-row:last-child { border-bottom: none; }
    .form-label { font-size: 14px; color: var(--text-sub); width: 70px; flex-shrink: 0; }
    .form-input {
      flex: 1; border: none; outline: none; font-size: 15px;
      color: var(--text-main); text-align: right; background: transparent;
    }
    .form-input::placeholder { color: var(--text-hint); }

    .save-wrap { padding: 24px 16px 0; }
  </style>
</head>
<body>
  <div class="app-header">
    <div class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <span class="page-title">编辑资料</span>
    <span class="header-action" id="saveBtn" onclick="saveProfile()">保存</span>
  </div>

  <div style="padding-top: var(--header-h);">
    <!-- 头像 -->
    <div class="avatar-section">
      <div class="avatar-ring" onclick="document.getElementById('fileInput').click()">
        <img id="avatarImg" src="" alt="头像">
        <div class="avatar-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2A3.2 3.2 0 1015.2 12 3.205 3.205 0 0012 15.2zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
          <span>更换头像</span>
        </div>
      </div>
      <div class="avatar-tip">点击头像更换图片</div>
      <div class="upload-bar" id="uploadBar"><div class="upload-fill" id="uploadFill"></div></div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
    </div>

    <!-- 表单 -->
    <div class="form-section">
      <div class="form-card">
        <div class="form-row">
          <span class="form-label">昵称</span>
          <input class="form-input" id="nickname" type="text" maxlength="20" placeholder="请输入昵称">
        </div>
        <div class="form-row">
          <span class="form-label">手机号</span>
          <input class="form-input" id="phone" type="text" readonly style="color:var(--text-hint)">
        </div>
        <div class="form-row">
          <span class="form-label">注册时间</span>
          <input class="form-input" id="createTime" type="text" readonly style="color:var(--text-hint)">
        </div>
      </div>
    </div>

    <div class="save-wrap">
      <button class="btn btn-primary btn-block" onclick="saveProfile()">保存修改</button>
    </div>
  </div>

  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    Utils.requireLogin();

    let currentIconUrl = '';

    (async () => {
      const info = await Utils.fetchUserInfo(true);
      if (!info) return;
      currentIconUrl = info.icon || '';
      document.getElementById('avatarImg').src   = Utils.avatar(info.icon);
      document.getElementById('nickname').value  = info.nickname || '';
      document.getElementById('phone').value     = Utils.maskPhone(info.phone);
      document.getElementById('createTime').value = Utils.formatDate(info.createTime) || '—';
    })();

    async function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { Utils.toast('图片不能超过 5MB'); return; }

      // 本地预览
      const reader = new FileReader();
      reader.onload = e => { document.getElementById('avatarImg').src = e.target.result; };
      reader.readAsDataURL(file);

      // 上传
      const bar  = document.getElementById('uploadBar');
      const fill = document.getElementById('uploadFill');
      bar.style.display = 'block';
      fill.style.width  = '30%';

      try {
        const fd = new FormData();
        fd.append('file', file);
        fill.style.width = '60%';
        const res = await axios.post('/api/upload/img', fd, {
          headers: { 'Content-Type': 'multipart/form-data' }
        });
        fill.style.width = '100%';
        if (res.data.success) {
          currentIconUrl = res.data.data;
          Utils.toast('头像上传成功');
        } else {
          Utils.toast('上传失败：' + (res.data.errorMsg || '未知错误'));
          document.getElementById('avatarImg').src = Utils.avatar(Utils.getUserInfo()?.icon);
        }
      } catch {
        Utils.toast('上传失败，请检查网络');
        document.getElementById('avatarImg').src = Utils.avatar(Utils.getUserInfo()?.icon);
      } finally {
        setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0'; }, 500);
        input.value = '';
      }
    }

    async function saveProfile() {
      const nickname = document.getElementById('nickname').value.trim();
      if (!nickname) { Utils.toast('昵称不能为空'); return; }

      const btn = document.getElementById('saveBtn');
      btn.style.opacity = '.5';
      btn.style.pointerEvents = 'none';

      try {
        const res = await axios.put('/api/user/profile', { nickname, icon: currentIconUrl });
        if (res.data.success) {
          Utils.removeUserInfo();
          Utils.toast('保存成功');
          setTimeout(() => history.back(), 800);
        } else {
          Utils.toast(res.data.errorMsg || '保存失败');
        }
      } catch {
        Utils.toast('网络异常，请稍后重试');
      } finally {
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
      }
    }
  </script>
</body>
</html>
