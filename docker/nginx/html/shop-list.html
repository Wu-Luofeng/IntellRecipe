<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家列表 - 滚动加载</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; padding-top: 70px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header-bar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .back-btn { text-decoration: none; color: #009688; font-size: 1.2rem; font-weight: bold; margin-right: 15px; display: flex; align-items: center; }
        .page-title { font-weight: bold; font-size: 1.1rem; }
        
        .shop-item { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .shop-item:active { transform: scale(0.98); }
        .shop-img { width: 80px; height: 80px; background: #eee; border-radius: 4px; object-fit: cover; margin-right: 15px; flex-shrink: 0; }
        .shop-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .shop-name { font-weight: bold; font-size: 16px; color: #333; }
        .shop-desc { color: #666; font-size: 13px; margin: 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .shop-meta { color: #999; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: #ff9800; font-weight: bold; background: #fff7e6; padding: 2px 5px; border-radius: 4px; }
        
        .loading, .no-more { text-align: center; padding: 20px; color: #999; }
        
        /* 骨架屏效果 */
        .skeleton { background: #f0f0f0; border-radius: 4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div id="app">
    <!-- 顶部导航栏 -->
    <div class="header-bar">
        <a href="index.html" class="back-btn">⬅</a>
        <span class="page-title">附近商家</span>
    </div>

    <div class="container">
        <div class="shop-list">
            <div v-for="shop in shopList" :key="shop.id" class="shop-item" @click="goToProducts(shop.id)" style="cursor: pointer;">
                <img :src="shop.image || 'https://via.placeholder.com/80?text=Shop'" class="shop-img" alt="商家图片" @error="handleImgError">
                <div class="shop-info">
                    <div class="shop-name">{{ shop.name }}</div>
                    <div class="shop-desc">{{ shop.description || '暂无描述' }}</div>
                    <div class="shop-meta">
                        <span class="score">★ {{ (shop.score / 10).toFixed(1) }}</span>
                        <span>{{ shop.address || '未知距离' }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="loading" class="loading">
            <span>🔄 加载中...</span>
        </div>
        <div v-if="finished && shopList.length > 0" class="no-more">
            <span>🏁 没有更多了</span>
        </div>
        <div v-if="finished && shopList.length === 0" class="no-more">
            <span>😕 暂无商家数据</span>
        </div>
    </div>
</div>

<script>
    // 配置 axios
    axios.defaults.baseURL = '/api';
    // 添加请求拦截器带上 token
    axios.interceptors.request.use(config => {
        const token = localStorage.getItem('token');
        if (token) {
            config.headers['Authorization'] = token;
        }
        return config;
    });

    new Vue({
        el: '#app',
        data: {
            shopList: [],
            loading: false,
            finished: false,
            lastId: null, // 游标
            limit: 10
        },
        mounted() {
            this.loadData();
            // 监听滚动事件
            window.addEventListener('scroll', this.handleScroll);
        },
        destroyed() {
            window.removeEventListener('scroll', this.handleScroll);
        },
        methods: {
            goToProducts(id) {
                window.location.href = `product-list.html?merchantId=${id}`;
            },
            handleImgError(e) {
                e.target.src = 'https://via.placeholder.com/80?text=No+Img';
            },
            handleScroll() {
                // 滚动到底部检测
                const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
                const clientHeight = document.documentElement.clientHeight;
                const scrollHeight = document.documentElement.scrollHeight;
                
                // 距离底部 50px 时触发加载
                if (scrollTop + clientHeight >= scrollHeight - 50) {
                    this.loadData();
                }
            },
            async loadData() {
                if (this.loading || this.finished) return;
                
                this.loading = true;
                try {
                    const params = { limit: this.limit };
                    if (this.lastId) {
                        params.lastId = this.lastId;
                    }

                    const res = await axios.get('/merchant/list', { params });
                    
                    if (res.data.success) {
                        const result = res.data.data;
                        const newList = result.list || [];
                        
                        if (newList.length > 0) {
                            this.shopList = this.shopList.concat(newList);
                            // 注意：后端返回的是 minTime 作为下一次的游标
                            this.lastId = result.minTime; 
                        } else {
                            this.finished = true; // 列表为空，肯定没数据了
                        }
                        
                        // 核心修复：如果返回的数据少于 limit，或者 minTime 为空，说明是最后一页
                        if (newList.length < this.limit || !result.minTime) {
                            this.finished = true;
                        }
                    } else {
                        console.error('加载失败:', res.data.errorMsg);
                    }
                } catch (err) {
                    console.error('请求出错:', err);
                } finally {
                    this.loading = false;
                }
            }
        }
    })
</script>
</body>
</html>
