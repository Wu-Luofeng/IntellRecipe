server:
  port: 8081

spring:
  application:
    name: user-service
  
  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:intell_recipe}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}

  # Redis Configuration
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123321}
    database: ${REDIS_DATABASE:0}
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# 图片上传目录（Nginx 需要同时配置 /uploads/ 静态路径）
upload:
  dir: ${UPLOAD_DIR:${user.home}/IntellRecipe/uploads}
  url-prefix: ${UPLOAD_URL_PREFIX:http://localhost/uploads}

# 阿里云号码认证服务（DYPNS）配置
# 接口：dypns.aliyuncs.com / SendSmsVerifyCode
# sign-name  -> 号码认证控制台「赠送签名配置」页面的签名名称（非自定义签名）
# template-code -> 号码认证控制台「赠送模板配置」页面的模板 CODE（数字，如 100001）
# AccessKey 为空时自动进入开发模式：验证码直接在接口响应中返回，无需配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
    # 验证码有效期（分钟），填入 TemplateParam 的 min 字段
    template-param-min: 5

# MyBatis Plus Configuration
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
