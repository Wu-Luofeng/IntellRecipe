<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>附近商家 - IntellRecipe</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .sticky-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
    }
    .header-row { display: flex; align-items: center; padding: 10px 16px 8px; gap: 12px; }
    .header-row .search-bar { flex: 1; }
    .filter-row {
      display: flex; gap: 8px; overflow-x: auto; padding: 6px 16px 10px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; display: flex; align-items: center; gap: 4px;
      padding: 5px 14px; border-radius: 16px; font-size: 13px; cursor: pointer;
      background: var(--bg); color: var(--text-sub); font-weight: 500;
      transition: background var(--transition), color var(--transition);
    }
    .filter-chip.active { background: var(--primary); color: #fff; }
    .filter-chip svg { width: 14px; height: 14px; }

    .sticky-placeholder { height: 106px; }

    /* 商家卡片 */
    .shop-card {
      background: var(--bg-card); border-radius: var(--radius-md);
      margin: 0 16px 12px; overflow: hidden; box-shadow: var(--shadow-sm);
      cursor: pointer; transition: transform var(--transition);
    }
    .shop-card:active { transform: scale(.99); }
    .shop-cover { width: 100%; height: 140px; object-fit: cover; background: var(--bg); position: relative; display: flex; align-items: center; justify-content: center; }
    .shop-cover-img { width: 100%; height: 100%; object-fit: cover; }
    .shop-cover-placeholder { font-size: 48px; }
    .shop-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--accent); color: #fff;
      padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
    }
    .shop-body { padding: 12px 14px; }
    .shop-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .shop-name { font-size: 16px; font-weight: 700; }
    .shop-tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .shop-rating { display: flex; align-items: center; gap: 4px; }
    .shop-rating .star { color: #FFC107; font-size: 14px; }
    .shop-rating .score { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .shop-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .shop-meta { font-size: 12px; color: var(--text-sub); display: flex; gap: 12px; }
    .shop-distance { font-size: 12px; color: var(--text-hint); display: flex; align-items: center; gap: 3px; }
    .shop-distance svg { width: 13px; height: 13px; }

    .sort-bar {
      display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .sort-item {
      flex: 1; text-align: center; padding: 10px 0; font-size: 13px;
      color: var(--text-sub); cursor: pointer; font-weight: 500;
      border-bottom: 2px solid transparent; transition: color var(--transition), border-color var(--transition);
    }
    .sort-item.active { color: var(--primary); border-bottom-color: var(--primary); }
  </style>
</head>
<body>
  <div id="app">
    <div class="sticky-header">
      <div class="header-row">
        <div class="search-bar" style="flex:1">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input v-model="keyword" @input="onSearch" type="text" placeholder="搜索商家、菜品">
        </div>
      </div>
      <div class="filter-row">
        <div v-for="tag in tags" :key="tag.id"
             :class="['filter-chip', activeTag === tag.id ? 'active' : '']"
             @click="switchTag(tag.id)">{{ tag.name }}</div>
      </div>
    </div>

    <div class="sticky-placeholder"></div>

    <!-- 排序栏 -->
    <div class="sort-bar">
      <div :class="['sort-item', sort==='default'?'active':'']" @click="setSort('default')">综合排序</div>
      <div :class="['sort-item', sort==='rating'?'active':'']" @click="setSort('rating')">评分最高</div>
      <div :class="['sort-item', sort==='distance'?'active':'']" @click="setSort('distance')">距离最近</div>
      <div :class="['sort-item', sort==='sales'?'active':'']" @click="setSort('sales')">销量最多</div>
    </div>

    <!-- 商家列表 -->
    <div v-for="shop in list" :key="shop.id" class="shop-card"
         @click="goDetail(shop.id)">
      <div class="shop-cover">
        <img v-if="firstImage(shop.images)" :src="firstImage(shop.images)" class="shop-cover-img" :alt="shop.name"
             @error="$event.target.style.display='none'">
        <span v-else class="shop-cover-placeholder">🏪</span>
        <div v-if="(shop.score/10) >= 4.8" class="shop-badge">精选</div>
      </div>
      <div class="shop-body">
        <div class="shop-top">
          <div>
            <div class="shop-name">{{ shop.name }}</div>
            <div class="shop-tag-row">
              <span v-if="shop.area" class="tag tag-gray">{{ shop.area }}</span>
            </div>
          </div>
          <div class="shop-rating">
            <span class="star">★</span>
            <span class="score">{{ shop.score != null ? (shop.score / 10).toFixed(1) : '—' }}</span>
          </div>
        </div>
        <div class="shop-bottom">
          <div class="shop-meta">
            <span>月售 {{ shop.sold || 0 }} 单</span>
            <span>人均 ¥{{ shop.avgPrice || 0 }}</span>
          </div>
          <div class="shop-distance" v-if="shop.address">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            {{ shop.address }}
          </div>
        </div>
      </div>
    </div>

    <div v-if="loading" class="load-more" style="text-align:center;padding:20px;color:var(--text-hint)">加载中…</div>
    <div v-else-if="noMore" class="load-more" style="text-align:center;padding:20px;color:var(--text-hint)">— 已显示全部 —</div>
    <div v-else-if="list.length===0 && !loading" class="empty-state">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>暂无商家</span>
    </div>

    <div style="height: var(--nav-h)"></div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item" onclick="location.href='ingredient-list.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2H14z"/></svg>
      <span>食材</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>商家</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 10V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2z"/></svg>
      <span>优惠券</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </div>
  </nav>

  <script src="js/vue.min.js"></script>
  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        list: [], lastId: null, limit: 12, loading: false, noMore: false,
        keyword: '', searchTimer: null,
        activeTag: 0, sort: 'default',
        tags: [
          { id: 0, name: '全部' },
          { id: 1, name: '健身餐' },
          { id: 2, name: '轻食' },
          { id: 3, name: '素食' },
          { id: 4, name: '低卡' },
          { id: 5, name: '高蛋白' },
        ],
      },
      created() { this.loadMore(); window.addEventListener('scroll', this.onScroll); },
      beforeDestroy() { window.removeEventListener('scroll', this.onScroll); },
      methods: {
        async loadMore() {
          if (this.loading || this.noMore) return;
          this.loading = true;
          try {
            const params = { limit: this.limit };
            if (this.lastId) params.lastId = this.lastId;
            const res = await axios.get('/api/merchant/list', { params });
            const data = res.data?.data || {};
            let rows = data.list || [];
            // 关键词前端过滤（后端暂无搜索接口）
            if (this.keyword) {
              const k = this.keyword.toLowerCase();
              rows = rows.filter(r => (r.name || '').toLowerCase().includes(k));
            }
            this.list.push(...rows);
            if (!rows.length || data.minTime == null) {
              this.noMore = true;
            } else {
              this.lastId = data.minTime;
            }
          } catch (e) {
            console.error(e);
            Utils.toast('加载失败');
          } finally { this.loading = false; }
        },
        firstImage(images) {
          if (!images) return '';
          return images.split(',')[0].trim();
        },
        onSearch()   { clearTimeout(this.searchTimer); this.searchTimer = setTimeout(()=>this.reset(), 400); },
        switchTag(id){ this.activeTag = id; this.reset(); },
        setSort(s)   { this.sort = s; this.reset(); },
        reset()      { this.list = []; this.lastId = null; this.noMore = false; this.loadMore(); },
        onScroll()   {
          const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
          if (scrollHeight - scrollTop - clientHeight < 120) this.loadMore();
        },
        goDetail(id) { location.href = `product-list.html?merchantId=${id}`; },
      }
    });
  </script>
</body>
</html>
