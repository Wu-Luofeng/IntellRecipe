<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>首页 - IntellRecipe</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 20px 20px 36px; color: #fff;
      border-radius: 0 0 24px 24px;
    }
    .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .hero-greeting h2 { font-size: 20px; font-weight: 700; }
    .hero-greeting p  { font-size: 13px; opacity: .85; margin-top: 2px; }
    .hero-avatar {
      width: 42px; height: 42px; border-radius: 50%; overflow: hidden;
      border: 2px solid rgba(255,255,255,.6); cursor: pointer; background: var(--primary-dark);
      transition: transform .15s ease, opacity .15s ease;
    }
    .hero-avatar:active { transform: scale(.9); opacity: .8; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* 每日营养卡 */
    .nutrition-card {
      background: rgba(255,255,255,.18); border-radius: var(--radius-md);
      padding: 14px 16px;
      transition: transform .15s ease, background .15s ease;
    }
    .nutrition-card:active { transform: scale(.98); background: rgba(255,255,255,.25); }
    .nc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .nc-label { font-size: 13px; opacity: .9; }
    .nc-val   { font-size: 13px; font-weight: 600; }
    .nc-bar   { height: 6px; background: rgba(255,255,255,.3); border-radius: 3px; overflow: hidden; }
    .nc-fill  { height: 100%; background: #fff; border-radius: 3px; transition: width .6s ease; }
    .nc-stats { display: flex; gap: 0; margin-top: 12px; }
    .nc-stat  { flex: 1; text-align: center; }
    .nc-stat-val  { font-size: 16px; font-weight: 700; }
    .nc-stat-lbl  { font-size: 11px; opacity: .8; }
    .nc-divider   { width: 1px; background: rgba(255,255,255,.3); margin: 4px 0; }

    /* 快捷入口 */
    .section { padding: 20px 16px 0; }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid-item {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 14px 4px; background: var(--bg-card);
      border-radius: var(--radius-md); cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .grid-item:active { transform: scale(.93); box-shadow: none; }
    .grid-icon {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .grid-icon svg { width: 24px; height: 24px; color: #fff; }
    .grid-label { font-size: 12px; color: var(--text-main); font-weight: 500; }

    /* 推荐食材 */
    .hscroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px 4px; scrollbar-width: none; }
    .hscroll::-webkit-scrollbar { display: none; }
    .ing-card {
      flex-shrink: 0; width: 100px; background: var(--bg-card);
      border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .ing-card:active { transform: scale(.94); box-shadow: none; }
    .ing-card img { width: 100%; height: 80px; object-fit: cover; background: var(--bg); }
    .ing-card-body { padding: 8px; }
    .ing-name  { font-size: 13px; font-weight: 600; }
    .ing-kcal  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  </style>
</head>
<body class="page-body-no-header">

  <!-- 英雄区 -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-greeting">
        <h2 id="greeting">你好，朋友</h2>
        <p id="greetSub">今天吃得怎么样？</p>
      </div>
      <div class="hero-avatar" onclick="location.href='profile.html'">
        <img id="avatarImg" src="" alt="头像">
      </div>
    </div>
    <!-- 每日营养卡（真实数据） -->
    <div class="nutrition-card" onclick="location.href='diet-log.html'" style="cursor:pointer">
      <div class="nc-row">
        <span class="nc-label" id="ncLabel">今日摄入</span>
        <span class="nc-val" id="ncVal">加载中…</span>
      </div>
      <div class="nc-bar"><div class="nc-fill" id="ncFill" style="width:0%"></div></div>
      <div class="nc-stats">
        <div class="nc-stat">
          <div class="nc-stat-val" id="ncItems">-</div>
          <div class="nc-stat-lbl">食材数</div>
        </div>
        <div class="nc-divider"></div>
        <div class="nc-stat">
          <div class="nc-stat-val" id="ncMeals">-</div>
          <div class="nc-stat-lbl">餐次</div>
        </div>
        <div class="nc-divider"></div>
        <div class="nc-stat">
          <div class="nc-stat-val" id="ncRemain">-</div>
          <div class="nc-stat-lbl">剩余可摄</div>
        </div>
        <div class="nc-divider"></div>
        <div class="nc-stat">
          <div class="nc-stat-val" id="ncGoal">2000</div>
          <div class="nc-stat-lbl">目标(千卡)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 快捷入口 -->
  <div class="section">
    <div class="section-title">快捷入口</div>
    <div class="grid-4">
      <div class="grid-item" onclick="location.href='ingredient-list.html'">
        <div class="grid-icon" style="background:#00BFA5">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2H14z"/></svg>
        </div>
        <span class="grid-label">食材大全</span>
      </div>
      <div class="grid-item" onclick="location.href='shop-list.html'">
        <div class="grid-icon" style="background:#5C6BC0">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span class="grid-label">附近商家</span>
      </div>
      <div class="grid-item" onclick="location.href='shop-list.html?mode=voucher'">
        <div class="grid-icon" style="background:#FF6E40">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 10V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2zm-2-1.46A4 4 0 0120 12a4 4 0 010 3.46V18H4v-2.54A4 4 0 014 12a4 4 0 010-3.46V6h16v2.54z"/></svg>
        </div>
        <span class="grid-label">领券中心</span>
      </div>
      <div class="grid-item" onclick="Utils.toast('健康报告开发中')">
        <div class="grid-icon" style="background:#EC407A">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        </div>
        <span class="grid-label">健康报告</span>
      </div>
      <div class="grid-item" onclick="location.href='diet-log.html'">
        <div class="grid-icon" style="background:#26A69A">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-2.47-1.96-5.99-7.51-5.99C2.96 8.99 1 12.51 1 15h15.03z"/></svg>
        </div>
        <span class="grid-label">今日食谱</span>
      </div>
      <div class="grid-item" onclick="Utils.toast('食谱推荐开发中')">
        <div class="grid-icon" style="background:#FFA726">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
        </div>
        <span class="grid-label">智能食谱</span>
      </div>
      <div class="grid-item" onclick="Utils.toast('购物车开发中')">
        <div class="grid-icon" style="background:#AB47BC">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.9 18 9 18h12v-2H9.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.47 5H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <span class="grid-label">购物车</span>
      </div>
      <div class="grid-item" onclick="location.href='profile.html'">
        <div class="grid-icon" style="background:#78909C">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <span class="grid-label">个人中心</span>
      </div>
    </div>
  </div>

  <!-- 推荐食材 -->
  <div class="section">
    <div class="section-title">今日推荐食材</div>
  </div>
  <div class="hscroll" id="ingList">
    <div class="ing-card" onclick="location.href='ingredient-list.html'">
      <div style="height:80px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:32px">🥦</div>
      <div class="ing-card-body"><div class="ing-name">西兰花</div><div class="ing-kcal">34千卡/100g</div></div>
    </div>
    <div class="ing-card" onclick="location.href='ingredient-list.html'">
      <div style="height:80px;background:#FFF3E0;display:flex;align-items:center;justify-content:center;font-size:32px">🍎</div>

    </div>
    <div class="ing-card" onclick="location.href='ingredient-list.html'">
      <div style="height:80px;background:#F3E5F5;display:flex;align-items:center;justify-content:center;font-size:32px">🥕</div>
      <div class="ing-card-body"><div class="ing-name">胡萝卜</div><div class="ing-kcal">41千卡/100g</div></div>
    </div>
    <div class="ing-card" onclick="location.href='ingredient-list.html'">
      <div style="height:80px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:32px">🐟</div>
      <div class="ing-card-body"><div class="ing-name">三文鱼</div><div class="ing-kcal">142千卡/100g</div></div>
    </div>
    <div class="ing-card" onclick="location.href='ingredient-list.html'">
      <div style="height:80px;background:#FCE4EC;display:flex;align-items:center;justify-content:center;font-size:32px">🥚</div>
      <div class="ing-card-body"><div class="ing-name">鸡蛋</div><div class="ing-kcal">144千卡/100g</div></div>
    </div>
  </div>

  <div style="height: 16px;"></div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'" style="transition:transform .12s ease" ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform=''">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item" onclick="location.href='ingredient-list.html'" style="transition:transform .12s ease" ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform=''">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2H14z"/></svg>
      <span>食材</span>
    </div>
    <div class="nav-item" onclick="location.href='shop-list.html'" style="transition:transform .12s ease" ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform=''">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>商家</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'" style="transition:transform .12s ease" ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform=''">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </div>
  </nav>

  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    (async () => {
      const hours = new Date().getHours();
      const greet = hours < 6 ? '夜深了' : hours < 11 ? '早上好' : hours < 14 ? '中午好' : hours < 18 ? '下午好' : '晚上好';
      const info = await Utils.fetchUserInfo();
      document.getElementById('greeting').textContent = `${greet}，${info?.nickname || '朋友'}`;
      document.getElementById('avatarImg').src = Utils.avatar(info?.icon);
    })();


    // 加载真实今日食谱热量数据
    (async () => {
      var GOAL = 2000;
      try {
        var info = await Utils.fetchUserInfo();
        if (info && info.gender != null && info.weight != null && info.height != null && info.age != null) {
          var bmr = 10 * info.weight + 6.25 * info.height - 5 * info.age + (info.gender === 1 ? 5 : -161);
          GOAL = Math.round(bmr);
        }
      } catch (_) {}
      try {
        const res = await axios.get('/api/diet/today');
        const data = res.data?.data;
        if (!data) return;

        const total = Math.round(parseFloat(data.totalCalories || 0));
        const entries = data.entries || [];
        const mealSet = new Set(entries.map(e => e.mealType));
        const remaining = GOAL - total;
        const pct = Math.min(Math.round(total / GOAL * 100), 100);

        document.getElementById('ncLabel').textContent = '今日摄入热量';
        document.getElementById('ncVal').textContent = `${total} / ${GOAL} 千卡`;
        document.getElementById('ncFill').style.width = pct + '%';
        document.getElementById('ncItems').textContent = entries.length;
        document.getElementById('ncMeals').textContent = mealSet.size;
        document.getElementById('ncRemain').textContent = remaining >= 0
          ? remaining + ' kcal'
          : '超' + (-remaining) + ' kcal';
        document.getElementById('ncRemain').style.color = remaining < 0 ? '#ff5252' : '#fff';
      } catch (e) {
        // 未登录或请求失败时，显示占位符
        document.getElementById('ncLabel').textContent = '今日摄入热量';
        document.getElementById('ncVal').textContent = '- - / 2000 千卡';
        document.getElementById('ncItems').textContent = '-';
        document.getElementById('ncMeals').textContent = '-';
        document.getElementById('ncRemain').textContent = '- -';
      }
    })();

    // 移动端 bfcache 恢复时重新加载今日食谱数据
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) {
        location.reload();
      }
    });
  </script>
</body>
</html>
