<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优惠券详情 - IntellRecipe</title>
    <!-- 使用本地 JS，彻底解决加载慢的问题 -->
    <script src="js/vue.min.js"></script>
    <script src="js/axios.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); }
        .voucher-card { text-align: center; padding: 40px 0; }
        .price { color: #f56c6c; font-size: 48px; font-weight: bold; }
        .title { font-size: 24px; color: #303133; margin: 10px 0; }
        .btn-buy {
            background-color: #009688; /* 青绿色系 */
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        .btn-buy:hover { background-color: #00796b; }
        .btn-buy:disabled { background-color: #ccc; cursor: not-allowed; }
        .result-box { margin-top: 20px; padding: 10px; background: #e8f5e9; color: #2e7d32; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div id="app" class="container">
    <div class="voucher-card">
        <div class="title">测试优惠券 (ID: {{ voucherId }})</div>
        <div class="price">¥ 100.00</div>
        <p>适用于全场商品，限时抢购！</p>
        
        <button class="btn-buy" @click="purchase" :disabled="loading">
            {{ loading ? '抢购中...' : '立即抢购' }}
        </button>

        <div class="result-box" v-show="orderId">
            🎉 抢购成功！订单ID: {{ orderId }}
        </div>
        
        <div v-show="errorMsg" style="color: red; margin-top: 10px;">
            {{ errorMsg }}
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            voucherId: 1, 
            loading: false,
            orderId: null,
            errorMsg: ''
        },
        created() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('id')) {
                this.voucherId = params.get('id');
            }
        },
        methods: {
            purchase() {
                this.loading = true;
                this.errorMsg = '';
                this.orderId = null;

                // 调用统一购买接口，注意加了 /api 前缀
                axios.post(`/api/voucher-orders/purchase/${this.voucherId}`, {}, {
                    headers: {
                        'authorization': localStorage.getItem('token') // 从 localStorage 获取 token
                    }
                })
                    .then(response => {
                        const res = response.data;
                        if (res.success) {
                            this.orderId = res.data;
                        } else {
                            this.errorMsg = res.errorMsg || '抢购失败';
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        this.errorMsg = '系统繁忙，请稍后再试';
                    })
                    .finally(() => {
                        this.loading = false;
                    });
            }
        }
    });
</script>
</body>
</html>
