<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>我的优惠券 - IntellRecipe</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .voucher-list { padding: 12px 16px 80px; }
    .v-full-card {
      display: flex; align-items: stretch; background: var(--bg-card);
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-sm); margin-bottom: 12px;
    }
    .v-full-left {
      width: 90px; flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 16px 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff;
    }
    .v-full-left.seckill { background: linear-gradient(135deg, #FF6E40, #FF3D00); }
    .v-full-amount { font-size: 28px; font-weight: 900; line-height: 1; }
    .v-full-unit { font-size: 12px; opacity: .9; }
    .v-full-right { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; }
    .v-full-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .v-full-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
    .v-full-shop { font-size: 12px; color: var(--text-hint); margin-bottom: 6px; }
    .v-full-status { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; }
    .v-full-status.valid { background: #E8F5E9; color: #43A047; }
    .v-full-status.used { background: #F5F5F5; color: #9E9E9E; }
    .v-full-status.expired { background: #FFF3E0; color: #EF6C00; }
    .v-full-actions { display: flex; gap: 8px; align-items: center; }
    .v-use-btn {
      padding: 8px 20px; border-radius: var(--radius-btn); border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
      background: var(--primary);
    }
    .v-use-btn:disabled { background: var(--text-hint); cursor: not-allowed; }
    .v-detail-link { font-size: 13px; color: var(--primary); cursor: pointer; }
    .load-tip { text-align: center; padding: 40px 20px; color: var(--text-hint); }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <span class="page-title">我的优惠券</span>
    </div>

    <div style="padding-top: var(--header-h)">
      <div class="voucher-list">
        <div v-if="loading" class="load-tip">加载中…</div>
        <template v-else-if="vouchers.length">
          <div v-for="v in vouchers" :key="v.orderId" class="v-full-card">
            <div :class="['v-full-left', v.type===1?'seckill':'']">
              <div class="v-full-amount">{{ formatYuan(v.actualValue) }}</div>
              <div class="v-full-unit">元券</div>
            </div>
            <div class="v-full-right">
              <div class="v-full-title">{{ v.title || '优惠券' }}</div>
              <div class="v-full-sub">{{ v.subTitle || ('满 ' + formatYuan(v.payValue) + ' 元可用') }}</div>
              <div class="v-full-shop" v-if="v.shopName">{{ v.shopName }}</div>
              <span :class="['v-full-status', statusClass(v.status)]">{{ statusText(v.status) }}</span>
              <div class="v-full-actions">
                <button class="v-use-btn"
                        :disabled="v.status !== 1"
                        @click="goUse(v)">
                  {{ v.status === 1 ? '去使用' : (v.status === 2 ? '已使用' : '已失效') }}
                </button>
                <span class="v-detail-link" @click="goVoucherDetail(v)">查看详情 ›</span>
              </div>
            </div>
          </div>
        </template>
        <div v-else class="empty-state">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 10V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2z"/></svg>
          <span>暂无优惠券</span>
          <p style="font-size:12px;color:var(--text-hint);margin-top:8px;text-align:center">
            去商家页面领取优惠券吧
          </p>
          <button class="btn btn-primary" style="margin-top:12px" @click="goShopList">去领券</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/vue.min.js"></script>
  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        vouchers: [],
        loading: false,
      },
      created() {
        if (!Utils.requireLogin()) {
          sessionStorage.setItem('redirectAfterLogin', location.href);
          location.href = 'login.html';
          return;
        }
        this.loadVouchers();
      },
      methods: {
        formatYuan(fen) {
          if (fen == null) return '—';
          return fen >= 500 ? (fen / 100).toFixed(0) : fen;
        },
        statusText(status) {
          return status === 1 ? '可使用' : (status === 2 ? '已使用' : '已失效');
        },
        statusClass(status) {
          return status === 1 ? 'valid' : (status === 2 ? 'used' : 'expired');
        },
        async loadVouchers() {
          this.loading = true;
          try {
            const res = await axios.get('/api/voucher-orders/my');
            this.vouchers = res.data?.data || [];
          } catch (e) {
            console.error(e);
            if (e.response?.status === 401) {
              sessionStorage.setItem('redirectAfterLogin', location.href);
              location.href = 'login.html';
            } else {
              Utils.toast('加载失败');
            }
          } finally { this.loading = false; }
        },
        goVoucherDetail(v) {
          location.href = 'voucher-detail.html?id=' + v.voucherId + '&merchantId=' + (v.shopId || '');
        },
        goUse(v) {
          if (v.shopId) {
            location.href = 'product-list.html?merchantId=' + v.shopId + '&tab=products';
          }
        },
        goShopList() {
          location.href = 'shop-list.html?mode=voucher';
        },
      },
    });
  </script>
</body>
</html>
