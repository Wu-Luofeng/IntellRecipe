<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>食材大全 - IntellRecipe</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    .search-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-card); padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .search-input-wrap { background: var(--bg); border-radius: 20px; display: flex; align-items: center; padding: 0 14px; gap: 8px; height: 40px; }
    .search-input-wrap svg { color: var(--text-hint); flex-shrink: 0; width: 18px; height: 18px; }
    .search-input-wrap input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; }
    .category-tabs {
      display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px 0;
      scrollbar-width: none; background: var(--bg-card);
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-chip {
      flex-shrink: 0; padding: 5px 16px; border-radius: 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: var(--bg); color: var(--text-sub);
      transition: background var(--transition), color var(--transition);
    }
    .tab-chip.active { background: var(--primary); color: #fff; }

    .search-header-h { height: 100px; }
    .list-wrap { padding: 8px 16px; }

    .ing-item {
      display: flex; align-items: center; background: var(--bg-card);
      border-radius: var(--radius-md); padding: 14px 14px;
      margin-bottom: 10px; gap: 14px; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: transform var(--transition);
    }
    .ing-item:active { transform: scale(.98); }
    .ing-thumb {
      width: 72px; height: 72px; border-radius: var(--radius-sm);
      background: var(--bg); object-fit: cover; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .ing-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
    .ing-body { flex: 1; min-width: 0; }
    .ing-name { font-size: 16px; font-weight: 600; }
    .ing-desc { font-size: 12px; color: var(--text-sub); margin: 4px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .ing-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .ing-kcal { color: var(--primary); font-size: 13px; font-weight: 600; }
    .ing-tags { display: flex; gap: 4px; }

    .fav-btn {
      width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background var(--transition);
    }
    .fav-btn:active { background: #FCE4EC; }
    .fav-btn svg { width: 18px; height: 18px; color: var(--text-hint); }
    .fav-btn.active svg { color: #E91E63; }

    .load-more { text-align: center; padding: 16px; color: var(--text-hint); font-size: 14px; }

    /* 占位 emoji */
    .emoji-bg { background: var(--bg); }
  </style>
</head>
<body>
  <div id="app">
    <!-- 搜索+分类固定头 -->
    <div class="search-header">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input v-model="keyword" @input="onSearch" type="text" placeholder="搜索食材，如「鸡胸肉」">
      </div>
      <div class="category-tabs">
        <div v-for="cat in categories" :key="cat.id"
             :class="['tab-chip', activeCat === cat.id ? 'active' : '']"
             @click="switchCat(cat.id)">{{ cat.name }}</div>
      </div>
    </div>

    <div class="search-header-h"></div>

    <!-- 列表 -->
    <div class="list-wrap">
      <div v-for="item in list" :key="item.id" class="ing-item">
        <div class="ing-thumb emoji-bg">
          <img v-if="item.image" :src="item.image" :alt="item.name" @error="$event.target.style.display='none'">
          <span v-else>{{ item.emoji || '🌿' }}</span>
        </div>
        <div class="ing-body">
          <div class="ing-name">{{ item.name }}</div>
          <div class="ing-desc">{{ item.description || '暂无简介' }}</div>
          <div class="ing-footer">
            <span class="ing-kcal">{{ item.nutritionValue || '营养信息待补充' }}</span>
            <div class="ing-tags">
              <span v-if="item.type" class="tag tag-primary">{{ item.type }}</span>
            </div>
          </div>
        </div>
        <button class="fav-btn" @click.stop="Utils.toast('收藏功能开发中')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
      </div>

      <div v-if="loading" class="load-more">加载中…</div>
      <div v-else-if="noMore" class="load-more">— 已显示全部 —</div>
      <div v-else-if="list.length === 0 && !loading" class="empty-state">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2H14z"/></svg>
        <span>没有找到相关食材</span>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2H14z"/></svg>
      <span>食材</span>
    </div>
    <div class="nav-item" onclick="location.href='shop-list.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <span>商家</span>
    </div>
    <div class="nav-item" onclick="location.href='voucher-list.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 10V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v4c1.1 0 2 .9 2 2s-.9 2-2 2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-4c-1.1 0-2-.9-2-2s.9-2 2-2z"/></svg>
      <span>优惠券</span>
    </div>
    <div class="nav-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </div>
  </nav>

  <script src="js/vue.min.js"></script>
  <script src="js/axios.min.js"></script>
  <script src="js/request.js"></script>
  <script src="js/utils.js"></script>
  <script>
    const EMOJI_MAP = { '蔬菜':'🥦','水果':'🍎','肉类':'🥩','海鲜':'🐟','蛋奶':'🥚','粮食':'🌾','坚果':'🥜','饮料':'🧃' };

    new Vue({
      el: '#app',
      data: {
        list: [], lastId: null, limit: 15, loading: false, noMore: false,
        keyword: '', searchTimer: null, activeCat: 0,
        categories: [
          { id: 0, name: '全部' },
          { id: 1, name: '蔬菜' },
          { id: 2, name: '水果' },
          { id: 3, name: '肉类' },
          { id: 4, name: '海鲜' },
          { id: 5, name: '蛋奶' },
          { id: 6, name: '粮食' },
          { id: 7, name: '坚果' },
        ],
      },
      created() { this.loadMore(); window.addEventListener('scroll', this.onScroll); },
      beforeDestroy() { window.removeEventListener('scroll', this.onScroll); },
      methods: {
        async loadMore() {
          if (this.loading || this.noMore) return;
          this.loading = true;
          try {
            // 关键词搜索走独立接口（不带分页）
            if (this.keyword) {
              const res = await axios.get('/api/ingredient/search', { params: { key: this.keyword } });
              const rows = (res.data?.data || []).map(r => ({ ...r, emoji: EMOJI_MAP[r.type] || '🌿' }));
              this.list = rows;
              this.noMore = true;
              return;
            }
            // 滚动查询
            const params = { limit: this.limit };
            if (this.lastId) params.lastId = this.lastId;
            const res = await axios.get('/api/ingredient/list', { params });
            const data = res.data?.data || {};
            const rows = (data.list || []).map(r => ({ ...r, emoji: EMOJI_MAP[r.type] || '🌿' }));
            // 按分类前端过滤
            const filtered = this.activeCat
              ? rows.filter(r => r.type === this.categories.find(c=>c.id===this.activeCat).name)
              : rows;
            this.list.push(...filtered);
            if (rows.length < this.limit || data.minTime == null) {
              this.noMore = true;
            } else {
              this.lastId = data.minTime;
            }
          } catch (e) {
            console.error(e);
            Utils.toast('加载失败');
          } finally { this.loading = false; }
        },
        onSearch() {
          clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => this.reset(), 400);
        },
        switchCat(id) { this.activeCat = id; this.reset(); },
        reset() { this.list = []; this.lastId = null; this.noMore = false; this.loadMore(); },
        onScroll() {
          const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
          if (scrollHeight - scrollTop - clientHeight < 120) this.loadMore();
        },
      }
    });
  </script>
</body>
</html>
