server:
  port: 8083

spring:
  application:
    name: voucher-service
  
  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:intell_recipe}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: 50
      connection-timeout: 30000

  # Redis Configuration
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123321}
    database: ${REDIS_DATABASE:0}
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 100
        max-wait: -1ms
        max-idle: 20
        min-idle: 0

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:root}
    password: ${RABBITMQ_PASSWORD:123456}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    # 开启发布确认机制（Confirm机制）
    publisher-confirm-type: correlated
    # 开启发布退回机制（Return机制）
    publisher-returns: true
    template:
      # 当路由失败时，强制退回消息给发送者，而不是静默丢弃
      mandatory: true
    listener:
      simple:
        # 开启手动 ACK，保证消费端不丢消息
        acknowledge-mode: manual
        # 限制每次预取 1 条消息，防止消息积压
        prefetch: 1

  # Nacos Config
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

# MyBatis Plus Configuration
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
