server:
  port: 8082

spring:
  application:
    name: item-service
  
  # MySQL Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.12.128:3307/intell_recipe?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  # Redis Configuration
  redis:
    host: 192.168.12.128
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # Elasticsearch Configuration
  elasticsearch:
    uris: http://192.168.12.128:9200

  # Nacos Config
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.12.128:8848

# MyBatis Plus Configuration
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
